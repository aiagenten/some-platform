[build]
  command = "npm run build"
  publish = ".next"

[functions]
  # Extend function timeout for LLM API calls (text gen + image gen = 15-30s)
  external_node_modules = ["sharp"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# @netlify/plugin-nextjs bundles all routes into a single function.
# Per-route function names (e.g. "api-video-*") do NOT exist — only this one does.
[functions."___netlify-server-handler"]
  timeout = 300
